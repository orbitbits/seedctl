[changelog]
# The header appears only once at the top of the file.
header = """
# Changelog

All notable milestones of this project will be documented in this file.\n
"""

# The body is what will be generated for each version.
body = """
{% if version %}\
    # [{{ version | trim_start_matches(pat="v") }}] – {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    # [unreleased] – {{ now() | date(format="%Y-%m-%d") }}
{% endif %}\
{% for commit in commits %}
    - {{ commit.message | upper_first }}\
{% endfor %}
\n
"""

# Remove extra white space
trim = true

# IMPORTANT: Change to false to prevent uncommitted versions from appearing "empty" in the log.
render_always = false

# Change everything in (#) to link the issues.
postprocessors = [
    { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/orbitbits/seedctl/issues/${1}))" },
]

[git]
# We disabled the filter so that regular commits (without features/fixes) appear in the list.
filter_unconventional = false
filter_commits = false
use_branch_tags = false
topo_order = true

# Important: Set the parsers to "SKIP" only what is considered junk.
commit_parsers = [
    # Ignore release commits
    { message = "^chore\\(release\\)", skip = true },
    # Ignore commits that only modify the README.
    { message = "(?i)readme", skip = true },
    # Ignore commits that only modify the .gitignore file.
    { message = "(?i)gitignore", skip = true },
    { message = "(?i)cargo.lock", skip = true },
    { message = "(?i)cargo.toml", skip = true },
    { message = "(?i)changelog", skip = true },
    { message = "(?i)docs?", skip = true },
		{ message = "(?i)(TODO)", skip = true },
    { message = "(?i)^test", skip = true },
    { message = "(?i)^(merge)", skip = true },
    { message = "(?i)^(update|updating|updated)", skip = true },
    { message = "(?i)^(add|adding|added) ", skip = true },
    { message = "(?i)^(delete|deleting|deleted|remove|removing)", skip = true },
]

# If you want it to ignore merge messages from GitHub:
skip_tags = ""
ignore_tags = ""
